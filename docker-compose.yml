version: "3.8"

services:
  mongo:
    container_name: mongo-poulailler
    image: mongo:7
    command: --port 27019
    volumes:
      - mongo_data:/data/db
    restart: always
    networks:
      - poulailler_network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--port",
          "27019",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  back:
    container_name: back-poulailler
    build:
      context: ../poulailler-back/
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27019/poulailler
      - FRONTEND_URL=http://localhost:8085
      # - FRONTEND_URL=http://TON_IP_VPS:8085
      - NODE_ENV=production
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - poulailler_network
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "const h=require('http');const req=h.get('http://localhost:3000/',res=>{process.exit(res.statusCode<500?0:1)});req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  front:
    container_name: front-poulailler
    build:
      context: .
      dockerfile: dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "8085:80"
    restart: always
    depends_on:
      back:
        condition: service_healthy
    networks:
      - poulailler_network
      # - nginx-proxy-manager_default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:

networks:
  poulailler_network:
  # nginx-proxy-manager_default:
  #   external: true
